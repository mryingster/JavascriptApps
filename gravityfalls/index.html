<!DOCTYPE html>

<html>
  <head>
    <title>Gravity Falls Ciphers</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="style.css" id="style">
    <script src="cipher.js"></script>
  </head>

  <body>
    <div id="content">
      <img src="images/GravityFalls.svg" id="title">
      <h1>Gravity Falls Cipher Decoder</h1>

      <div id="input">
        <textarea id="cipherInput"></textarea>
        <br>
        Load Episode Message: <select id="preloadedMessages"><option value="-1">---</option></select>
      </div>

      <br>

      <div class="cipher">
        <input class="checkbox" type="checkbox" id="useA1z26"></input>A1Z26 Cipher (Digitize)
         <img class="help" src="images/help.svg" title="This cipher converts numbers into letters. As the name suggests, A=1, B=2... Z=26.">
      </div>

      <div class="cipher">
        <input class="checkbox" type="checkbox" id="useBinary"></input>Binary
        <img class="help" src="images/help.svg" title="This converts binary numbers into letters. Each set of 8 binary digits equates to a digit representing ASCII.">
      </div>

      <div class="cipher">
        <input class="checkbox" type="checkbox" id="useCeasar"></input>Ceasar Cipher (Shift)
         <img class="help" src="images/help.svg" title="A Ceasar or Shift Cipher works by shifting all the letters of the text a given amount. Select the shift amount to recompute the text.">
         <select id="ceasarShift"></select>
       </div>

      <div class="cipher">
        <input class="checkbox" type="checkbox" id="useAtbash"></input>Atbash (Reverse)
         <img class="help" src="images/help.svg" title="The Atbash Cipher uses a reversed alphabet.">
       </div>

      <div class="cipher">
        <input class="checkbox" type="checkbox" id="useVigenere"></input>Vigen&egrave;re
         <img class="help" src="images/help.svg" title="Vigen&egrave;re Ciphers use a (repeated) keyword to indicate how much to shift a letter over, like a Ceasar Cipher.">
         Key: <input id="vigenereKey" value="SAMPLE"></input>
       </div>

      <p id="resultContainer">
        <span id="cipherOutput"></span>
      </p>

      <object data="images/BillCipher.svg" id="bill" type="image/svg+xml"></object>

    </div>
  </body>
</html>
