<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arkanoid Level Organizer</title>
    <script src="bricks.js"></script>
    <script src="enemy.js"></script>
    <script src="levels.js"></script>

<style>
body{
    font-family:sans-serif;
    margin:0;
}

#toolbar{
    padding:10px;
    background:#222;
    color:white;
}

#board{
    display:flex;
    gap:12px;
    padding:12px;
    overflow-x:auto;
}

.column{
    min-width:170px;
    background:#eee;
    border-radius:4px;
    padding:6px;
}

.column-header{
    font-weight:bold;
    margin-bottom:6px;
}

.card{
    margin-bottom:6px;
    cursor:grab;
    border:1px solid #aaa;
    background:white;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div id="toolbar">
Arkanoid Level Organizer — drag maps between levels.  
When finished run <b>copy(levels)</b> in the console.
</div>

<div id="board"></div>

<script>


//////////////////////////////////////////////////////////

const MAX_LEVEL = 34
const board = document.getElementById("board")

// create columns
for(let i=0;i<=MAX_LEVEL;i++){

    const col=document.createElement("div")
    col.className="column"
    col.dataset.level=i

    const header=document.createElement("div")
    header.className="column-header"
    header.textContent="Level "+i

    col.appendChild(header)

    col.addEventListener("dragover",e=>{
        e.preventDefault()
    })

    col.addEventListener("drop",e=>{
        e.preventDefault()

        const mapIndex=e.dataTransfer.getData("text/plain")
        const map=levels[mapIndex]

        map.level=i

        render()
    })

    board.appendChild(col)
}

//////////////////////////////////////////////////////////

function render(){

    document.querySelectorAll(".card").forEach(e=>e.remove())

    levels.forEach((map,index)=>{

        const column=document.querySelector(
            `.column[data-level='${map.level}']`
        )

        if(!column) return

        const canvas=document.createElement("canvas")
        canvas.width=130
        canvas.height=180

        canvas.className="card"
        canvas.draggable=true
        canvas.title=map.note || ""

        canvas.addEventListener("dragstart",e=>{
            e.dataTransfer.setData("text/plain",index)
        })

        column.appendChild(canvas)

        renderLevel(canvas,map)
    })
}

//////////////////////////////////////////////////////////
// SIMPLE RENDERER (replace with yours if desired)
//////////////////////////////////////////////////////////

function renderLevelgpt(canvas,map){

    const ctx=canvas.getContext("2d")

    const rows=map.bricks.length
    const cols=map.bricks[0].length

    const brickW=canvas.width/cols
    const brickH=canvas.height/rows

    ctx.clearRect(0,0,canvas.width,canvas.height)

    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){

            const brick=map.bricks[y][x]
            if(!brick) continue

            const hue=(brick/16)*20

            ctx.fillStyle=`hsl(${hue},70%,50%)`

            ctx.fillRect(
                x*brickW,
                y*brickH,
                brickW-1,
                brickH-1
            )
        }
    }
}

//////////////////////////////////////////////////////////

function renderLevel(canvas, level) {
    const ctx = canvas.getContext("2d");

    const w = canvas.width / 13;
    const h = w / 2;

    // Draw bricks
    for (let y=0; y<level.bricks.length; y++) {
        for (let x=0; x<level.bricks[y].length; x++) {
            const brick = level.bricks[y][x];
            if (brick != null) {
                const style = brick_types[level.bricks[y][x]];
                const color = `hsl(${style.h}, ${style.s}%, ${style.l}%)`;
                ctx.fillStyle = color;
                ctx.fillRect(x * w, y * h, w, h);
            }
        }
    }

    return;
}

function exportLevels() {
    let output=""
    for (let level of levels) {
	output += convertObjectToString(level);
    }
    console.log(output);
}

function convertObjectToString(o) {
    let output = "{\n"
    for (key in o)
	switch (key) {
	case "enemy":
	    output += `    ${key}: ${JSON.stringify(o[key]).replaceAll('"', '', true)},\n`
	    break;
	case "bricks":
	    output += `    ${key}: ${convert2dArrayToString(o[key], "    ")}\n`;
	    break;
        case "level":
	    output += `    ${key}: ${o[key]},\n`
            break;
	default:
	    output += `    ${key}: "${o[key]}",\n`
	    break;
	}
    output += "},\n"
    return output;
}

function convert2dArrayToString(a, i="") {
    output = "[\n";
    for (let y of a) {
	const newLine = y
	      .map(v => {
		  if (v === null)
		      return "null";
		  else
		      return "0x" + Number(v).toString(16);

		  return String(v);
	      })
	      .join(",");
	output += `${i}${i}[${newLine}],\n`
    }
    output += `${i}],`
    return output;
}


render()

</script>

</body>
</html>
